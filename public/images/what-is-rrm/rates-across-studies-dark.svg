<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" role="img" aria-label="Adjusted cumulative live birth rates across NaProTechnology studies">
  <title>Adjusted Rates Across NaProTechnology Studies</title>
  <desc>Horizontal bar chart of adjusted cumulative take-home baby rates across four NaProTechnology studies. Tham 2012 with n=108: 66.0 percent. Sanchez-Mendez 2025 at 36 months with n=1,310: 62.1 percent. Stanford 2008 with n=1,072: 52.8 percent. Stanford 2021 with n=370: 29.0 percent.</desc>

  <style>
    .heading { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; fill: #b0aaa2; letter-spacing: 0.05em; }
    .divider { stroke: #6b5877; stroke-width: 1; }
    .label { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400; fill: #b0aaa2; text-anchor: end; dominant-baseline: central; }
    .track { fill: #3a3632; }
    .bar-highlight { fill: #b8a3c4; }
    .bar-other { fill: #6b6560; }
    .value { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; dominant-baseline: central; }
    .value-highlight { fill: #b8a3c4; }
    .value-other { fill: #b0aaa2; }
    .caption { font-family: 'Inter', sans-serif; font-size: 11.5px; font-style: italic; fill: #c9b8d3; }
    .attribution { font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 500; fill: #8b827a; letter-spacing: 0.04em; text-anchor: end; }
  </style>

  <rect width="700" height="360" fill="#28241e"/>

  <text x="30" y="35" class="heading">ADJUSTED RATES ACROSS NAPRO STUDIES</text>
  <line x1="30" y1="48" x2="670" y2="48" class="divider"/>

  <text x="265" y="90" class="label">Tham 2012 (n=108)</text>
  <rect x="278" y="78" width="320" height="22" rx="3" class="track"/>
  <rect x="278" y="78" width="320" height="22" rx="3" class="bar-other"/>
  <text x="608" y="90" class="value value-other">66.0%</text>

  <text x="265" y="135" class="label">Sanchez-Mendez 2025, 36 mo (n=1,310)</text>
  <rect x="278" y="123" width="320" height="22" rx="3" class="track"/>
  <rect x="278" y="123" width="301" height="22" rx="3" class="bar-highlight"/>
  <text x="608" y="135" class="value value-highlight">62.1%</text>

  <text x="265" y="180" class="label">Stanford 2008 (n=1,072)</text>
  <rect x="278" y="168" width="320" height="22" rx="3" class="track"/>
  <rect x="278" y="168" width="256" height="22" rx="3" class="bar-other"/>
  <text x="608" y="180" class="value value-other">52.8%</text>

  <text x="265" y="225" class="label">Stanford 2021 (n=370)</text>
  <rect x="278" y="213" width="320" height="22" rx="3" class="track"/>
  <rect x="278" y="213" width="141" height="22" rx="3" class="bar-other"/>
  <text x="608" y="225" class="value value-other">29.0%</text>

  <text x="30" y="285" class="caption">Adjusted cumulative take-home baby rates from general infertility populations.</text>
  <text x="30" y="303" class="caption">Boyle 2018 (32.1%, post-IVF-failure cohort) excluded for comparability. Bars normalized to the highest rate.</text>

  <text x="670" y="348" class="attribution">rrmacademy.org/what-is-rrm</text>
</svg>
