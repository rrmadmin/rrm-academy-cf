<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="RRM Academy Educational Partner">
  <style>
    .bg { fill: #ffffff; stroke: #dddbd8; stroke-width: 1; }
    .rule { stroke: #725e7e; stroke-width: 1.5; }
    .eyebrow { fill: #725e7e; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase; text-anchor: middle; }
    .wordmark { fill: #313131; font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif; font-size: 28px; font-weight: 600; letter-spacing: 0.01em; text-anchor: middle; }
    .sub { fill: #636261; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; text-anchor: middle; }
  </style>
  <rect class="bg" x="0.5" y="0.5" width="239" height="239" rx="6"/>
  <text class="eyebrow" x="120" y="80">Educational</text>
  <text class="eyebrow" x="120" y="100">Partner</text>
  <line class="rule" x1="102" y1="118" x2="138" y2="118"/>
  <text class="wordmark" x="120" y="152">RRM</text>
  <text class="wordmark" x="120" y="184">Academy</text>
  <text class="sub" x="120" y="212">rrmacademy.org</text>
</svg>
