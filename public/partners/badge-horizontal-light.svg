<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" role="img" aria-label="RRM Academy Educational Partner">
  <style>
    .bg { fill: #ffffff; stroke: #dddbd8; stroke-width: 1; }
    .rule { stroke: #725e7e; stroke-width: 1.5; }
    .eyebrow { fill: #725e7e; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; }
    .wordmark { fill: #313131; font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif; font-size: 28px; font-weight: 600; letter-spacing: 0.01em; }
  </style>
  <rect class="bg" x="0.5" y="0.5" width="319" height="95" rx="4"/>
  <text class="eyebrow" x="24" y="34">Educational Partner</text>
  <line class="rule" x1="24" y1="46" x2="60" y2="46"/>
  <text class="wordmark" x="24" y="72">RRM Academy</text>
</svg>
