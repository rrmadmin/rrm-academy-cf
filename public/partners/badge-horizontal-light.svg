<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" role="img" aria-label="RRM Academy Educational Partner">
  <defs>
    <linearGradient id="gold-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b878"/>
      <stop offset="50%" stop-color="#b89968"/>
      <stop offset="100%" stop-color="#9e8052"/>
    </linearGradient>
  </defs>
  <style>
    .bg { fill: #ffffff; }
    .frame-outer { fill: none; stroke: url(#gold-light); stroke-width: 0.75; }
    .frame-inner { fill: none; stroke: url(#gold-light); stroke-width: 0.5; opacity: 0.5; }
    .rule { stroke: url(#gold-light); stroke-width: 1; }
    .ornament { fill: url(#gold-light); }
    .eyebrow { fill: #725e7e; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; text-anchor: middle; }
    .wordmark { fill: #313131; font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif; font-size: 32px; font-weight: 600; letter-spacing: 0.015em; text-anchor: middle; }
    .footer { fill: #725e7e; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-size: 8px; font-weight: 500; letter-spacing: 0.32em; text-transform: uppercase; text-anchor: middle; }
  </style>
  <rect class="bg" width="360" height="120"/>
  <rect class="frame-outer" x="6" y="6" width="348" height="108"/>
  <rect class="frame-inner" x="10" y="10" width="340" height="100"/>
  <!-- Corner flourishes: tiny serif L-shapes in gold -->
  <g class="ornament">
    <path d="M 14 18 L 14 14 L 18 14" fill="none" stroke="url(#gold-light)" stroke-width="0.9"/>
    <path d="M 346 18 L 346 14 L 342 14" fill="none" stroke="url(#gold-light)" stroke-width="0.9"/>
    <path d="M 14 102 L 14 106 L 18 106" fill="none" stroke="url(#gold-light)" stroke-width="0.9"/>
    <path d="M 346 102 L 346 106 L 342 106" fill="none" stroke="url(#gold-light)" stroke-width="0.9"/>
  </g>
  <text class="eyebrow" x="180" y="38">Educational Partner</text>
  <!-- Gold rule with center ornament -->
  <line class="rule" x1="90" y1="48" x2="168" y2="48"/>
  <circle class="ornament" cx="180" cy="48" r="2"/>
  <line class="rule" x1="192" y1="48" x2="270" y2="48"/>
  <text class="wordmark" x="180" y="82">RRM Academy</text>
  <text class="footer" x="180" y="102">Restorative Reproductive Medicine</text>
</svg>
