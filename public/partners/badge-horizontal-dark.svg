<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" role="img" aria-label="RRM Academy Educational Partner">
  <style>
    .bg { fill: #2e2636; }
    .label { fill: #f7f0e8; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-size: 30px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; text-anchor: middle; }
    .wordmark { fill: #c9b8d3; font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif; font-size: 30px; font-weight: 600; letter-spacing: 0.015em; text-anchor: middle; }
  </style>
  <rect class="bg" x="0" y="0" width="420" height="140" rx="24" ry="24"/>
  <text class="label" x="210" y="64">Educational Partner</text>
  <text class="wordmark" x="210" y="100">RRM Academy</text>
</svg>
