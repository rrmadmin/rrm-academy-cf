# RRM Academy — Cloudflare Pages (full site)
# Deploy: CLOUDFLARE_ACCOUNT_ID="ecf2c5bc8b5ebd634bcb587b3890910a" npx wrangler pages deploy dist --project-name rrm-academy
#
# Renamed from rrm-library (2026-02-21) — project now serves the full site,
# not just /library. Traffic routed via rrm-router Worker.

name = "rrm-academy"
pages_build_output_dir = "dist"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "SURVEY_TOKENS"
id = "ef52bc09f1b44b5f8e3367372be8d63d"

[[kv_namespaces]]
binding = "COMMUNITY_KV"
id = "63fed002ac2c46a08bf5217b5900a928"

[[d1_databases]]
binding = "DB"
database_name = "rrm-auth"
database_id = "22742c9c-77fa-4344-abda-7e7e8b0da9de"

[[d1_databases]]
binding = "SURVEY_DB"
database_name = "rrm-survey"
database_id = "55e8038c-d73c-4db3-8ed0-8a34694f360a"

[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "rrm-analytics"
database_id = "8967f69e-1213-411f-a4a9-5586889ad401"

[[r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "rrm-assets"

[[vectorize]]
binding = "VECTORIZE"
index_name = "rrm-library-vectors"

[ai]
binding = "AI"

[[analytics_engine_datasets]]
binding = "EVENTS"
dataset = "worker_events"
