# RRM Academy — Cloudflare Pages (full site)
# Deploy: CLOUDFLARE_ACCOUNT_ID="ecf2c5bc8b5ebd634bcb587b3890910a" npx wrangler pages deploy dist --project-name rrm-academy
#
# Renamed from rrm-library (2026-02-21) — project now serves the full site,
# not just /library. Traffic routed via rrm-router Worker.

name = "rrm-academy"
pages_build_output_dir = "dist"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "SURVEY_TOKENS"
id = "ef52bc09f1b44b5f8e3367372be8d63d"

[[d1_databases]]
binding = "DB"
database_name = "rrm-auth"
database_id = "22742c9c-77fa-4344-abda-7e7e8b0da9de"
