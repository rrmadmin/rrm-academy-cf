name: gh-pat-verify

# Daily check that WORKFLOWS_PAT has the scopes the automation expects.
# Catches the 2026-05-17 scope-drop where a rotated PAT came back with
# `repo` only, breaking workflow-YAML pushes silently for hours.
# Memory: github-pat-rotation-needed-2026-05-17.md
#
# Self-check: the workflow uses WORKFLOWS_PAT to query GitHub's /user
# endpoint and inspects the X-OAuth-Scopes response header. Any auth
# scope is sufficient for /user; we're not exercising the missing scopes
# directly, just observing what was minted.

on:
  schedule:
    - cron: '13 13 * * *'  # 09:13 ET daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Inspect PAT scopes
        env:
          PAT: ${{ secrets.WORKFLOWS_PAT }}
          REQUIRED: 'repo,workflow,read:org'
        run: |
          set -uo pipefail
          if [[ -z "${PAT:-}" ]]; then
            echo "::error::secrets.WORKFLOWS_PAT is empty"
            exit 1
          fi
          scopes_line=$(curl -sS -I \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user 2>/dev/null \
            | tr -d '\r' \
            | grep -i '^x-oauth-scopes:' \
            || echo "")
          if [[ -z "$scopes_line" ]]; then
            echo "::error::no X-OAuth-Scopes header in response (token invalid or revoked)"
            exit 1
          fi
          present=$(echo "$scopes_line" | sed -E 's/^x-oauth-scopes:[[:space:]]*//i' | tr -d '\r' | tr ',' ' ' | xargs)
          echo "expected: $REQUIRED"
          echo "present:  $present"
          missing=()
          IFS=',' read -ra wanted <<< "$REQUIRED"
          for scope in "${wanted[@]}"; do
            scope_trim=$(echo "$scope" | xargs)
            [[ -z "$scope_trim" ]] && continue
            if ! echo " $present " | grep -qE "[[:space:]]${scope_trim}[[:space:]]"; then
              missing+=("$scope_trim")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::PAT missing scopes: ${missing[*]}. Rotate at https://github.com/settings/tokens and update op://Automation/Github PAT."
            exit 1
          fi
          echo "OK: all required scopes present"
