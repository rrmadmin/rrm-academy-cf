name: Merge Claude Branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  actions: write

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    steps:
      # Mint a per-job installation access token from the "RRM Admin Automation"
      # GitHub App (App ID + private key in repo secrets, key SSOT is 1P
      # op://Automation/RRM Admin Automation App/Private Key). The token has
      # `workflow` write access via the App's installed permissions, which the
      # default GITHUB_TOKEN cannot provide. Tokens auto-expire in 1h — no
      # rotation needed. Replaces the WORKFLOWS_PAT classic PAT (migrated
      # 2026-05-21, see memory: github-app-rrm-admin-automation.md).
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RRM_ADMIN_APP_ID }}
          private-key: ${{ secrets.RRM_ADMIN_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Security guard
        run: node scripts/guard.mjs

      - name: iOS auto-zoom guard
        run: node scripts/guard-ios-zoom.mjs

      - name: Satellite-managed-path guard
        run: node scripts/check-no-moved-paths.mjs

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Build check removed: data files (articles/posts/faqs/etc.) are gitignored
      # and fetched via worker/Airtable secrets in deploy.yml. The merge workflow
      # doesn't have those secrets, and Astro loaders explicitly throw on empty
      # data. deploy.yml on main catches build errors; this workflow gates on
      # lint + test + guard, which are the real pre-merge safety net.

      - name: Merge into main and push
        id: merge
        run: |
          git config user.name "rrm-admin-automation[bot]"
          git config user.email "286686868+rrm-admin-automation[bot]@users.noreply.github.com"
          git checkout main
          BEFORE=$(git rev-parse HEAD)
          git merge --no-ff ${{ github.sha }} --no-edit
          AFTER=$(git rev-parse HEAD)
          git push origin main
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN pushes do NOT trigger other workflows (GitHub anti-recursion).
      # Explicitly dispatch Build & Deploy on main so merges from claude/**
      # actually ship. Without this, merges land silently and production drifts.
      #
      # Path filter mirrors deploy.yml's push trigger so doc-only merges (CLAUDE.md,
      # docs/**, memory notes) don't burn ~10 billable Actions minutes per merge.
      # Keep this list in sync with deploy.yml `on.push.paths`.
      - name: Trigger Build & Deploy
        if: steps.merge.outputs.before != steps.merge.outputs.after
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(git diff --name-only ${{ steps.merge.outputs.before }}..${{ steps.merge.outputs.after }})
          if echo "$CHANGED" | grep -qE '^(src/|public/|functions/|ssot/|astro\.config\.|wrangler\.toml$|scripts/(build-og-index|ssot-prebuild)\.mjs$|docs/design/design-system\.manual\.json$|package\.json$|package-lock\.json$|tsconfig\.json$)'; then
            gh workflow run deploy.yml --ref main
            echo "Triggered Build & Deploy on main"
          else
            echo "::notice title=Skipping Build & Deploy::Doc-only merge, no build-relevant paths touched."
            echo "Changed files (first 10):"
            echo "$CHANGED" | head -10
          fi
