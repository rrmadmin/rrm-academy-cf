name: Merge Claude Branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  actions: write

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT (with `workflow` scope) so the push step can update
          # workflow files in .github/workflows/. The default GITHUB_TOKEN
          # cannot push workflow-file changes regardless of `permissions:`.
          # PAT is stored in 1Password and bound to the repo as WORKFLOWS_PAT.
          # Without this, claude/** branches that touch
          # any .github/workflows/*.yml are remote-rejected at merge time.
          token: ${{ secrets.WORKFLOWS_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Security guard
        run: node scripts/guard.mjs

      - name: iOS auto-zoom guard
        run: node scripts/guard-ios-zoom.mjs

      - name: Satellite-managed-path guard
        run: node scripts/check-no-moved-paths.mjs

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Build check removed: data files (articles/posts/faqs/etc.) are gitignored
      # and fetched via worker/Airtable secrets in deploy.yml. The merge workflow
      # doesn't have those secrets, and Astro loaders explicitly throw on empty
      # data. deploy.yml on main catches build errors; this workflow gates on
      # lint + test + guard, which are the real pre-merge safety net.

      - name: Merge into main and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-ff ${{ github.sha }} --no-edit
          git push origin main

      # GITHUB_TOKEN pushes do NOT trigger other workflows (GitHub anti-recursion).
      # Explicitly dispatch Build & Deploy on main so merges from claude/**
      # actually ship. Without this, merges land silently and production drifts.
      #
      # Path filter mirrors deploy.yml's push trigger so doc-only merges (CLAUDE.md,
      # docs/**, memory notes) don't burn ~10 billable Actions minutes per merge.
      # Keep this list in sync with deploy.yml `on.push.paths`.
      - name: Trigger Build & Deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(git diff --name-only HEAD^..HEAD)
          if echo "$CHANGED" | grep -qE '^(src/|public/|functions/|astro\.config\.|package\.json$|package-lock\.json$|tsconfig\.json$)'; then
            gh workflow run deploy.yml --ref main
            echo "Triggered Build & Deploy on main"
          else
            echo "::notice title=Skipping Build & Deploy::Doc-only merge, no build-relevant paths touched."
            echo "Changed files (first 10):"
            echo "$CHANGED" | head -10
          fi
