name: Merge Claude Branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Security guard
        run: node scripts/guard.mjs

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Build check removed: data files (articles/posts/faqs/etc.) are gitignored
      # and fetched via worker/Airtable secrets in deploy.yml. The merge workflow
      # doesn't have those secrets, and Astro loaders explicitly throw on empty
      # data. deploy.yml on main catches build errors; this workflow gates on
      # lint + test + guard, which are the real pre-merge safety net.

      - name: Merge into main and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge ${{ github.sha }} --no-edit
          git push origin main
