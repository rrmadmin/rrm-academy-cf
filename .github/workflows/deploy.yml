name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.*'
      - 'package.json'
      - 'package-lock.json'
      - 'functions/**'
      - 'tsconfig.json'
  repository_dispatch:
    types: [publish]
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: 'Skip Airtable data fetch (use cached data from last run)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security guard
        run: node scripts/guard.mjs

      - name: Get cache date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore data cache
        uses: actions/cache@v4
        id: data-cache
        with:
          path: src/data
          key: airtable-data-${{ steps.date.outputs.date }}
          restore-keys: |
            airtable-data-

      - name: Restore git-committed data files over cache
        run: git checkout HEAD -- src/data/quizzes.json src/data/courses.json src/data/funding-projects.json

      - name: Fetch data from Airtable
        if: ${{ !inputs.skip_fetch }}
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          TINIFY_API_KEY: ${{ secrets.TINIFY_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm run fetch-all
          echo "Articles: $(node -e "console.log(require('./src/data/articles.json').length)")"
          echo "Posts: $(node -e "console.log(require('./src/data/posts.json').length)")"

      - name: Verify data files
        run: |
          fail=0
          for f in src/data/articles.json src/data/posts.json src/data/faqs.json src/data/courses.json; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found. Cannot build without data files."
              echo "If using skip_fetch, ensure a previous run has cached the data."
              fail=1
            elif [ "$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).length)")" = "0" ]; then
              echo "ERROR: $f contains zero records. Aborting to prevent empty deploy."
              fail=1
            fi
          done
          [ "$fail" = "0" ] || exit 1

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name rrm-academy
