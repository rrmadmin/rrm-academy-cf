name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'ssot/**'
      - 'astro.config.*'
      - 'wrangler.toml'
      - 'scripts/build-og-index.mjs'
      - 'scripts/ssot-prebuild.mjs'
      - 'docs/design/design-system.manual.json'
      - 'package.json'
      - 'package-lock.json'
      - 'functions/**'
      - 'tsconfig.json'
  repository_dispatch:
    types: [publish]
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: 'Skip data fetch (use cached data from last run)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Record job start time
        id: timer
        run: echo "start=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security guard
        run: node scripts/guard.mjs

      - name: iOS auto-zoom guard
        run: node scripts/guard-ios-zoom.mjs

      - name: Satellite-managed-path guard
        run: node scripts/check-no-moved-paths.mjs

      - name: Agent discovery surface guard
        run: node scripts/agent-discovery-check.mjs

      - name: Pillar registry guard
        run: node scripts/gates/validate-pillar-registry.mjs

      - name: Canonical lockdown
        run: node scripts/check-canonical-lockdown.mjs

      - name: Get cache date
        id: date
        run: echo "date=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore data cache
        uses: actions/cache@v4
        id: data-cache
        with:
          path: src/data
          key: site-data-${{ steps.date.outputs.date }}
          restore-keys: |
            site-data-

      - name: Restore git-committed data files over cache
        # courses.json is NOT restored — D1 is SSOT (Step 10 of D1 migration plan).
        # Tracking it caused stale-state regressions on non-course repository_dispatch
        # events that skip fetch-all (article_id / record_id / faq_id / glossary_term_id).
        # glossary.json is NOT restored — D1 is SSOT. Generated file like articles.json (gitignored).
        # glossary-sources-overrides.json IS restored — staging file merged by
        # fetch-glossary-data.mjs after the D1 fetch (until glossary_definition_source
        # D1 table is populated and the /api/glossary/terms endpoint LEFT JOINs it).
        run: git checkout HEAD -- src/data/quizzes.json src/data/courses-overrides.json src/data/funding-projects.json src/data/team.json src/data/survey-count.json src/data/.baselines.json src/data/glossary-sources-overrides.json src/data/providers.json

      - name: Fetch single blog record (dispatch)
        if: ${{ github.event.client_payload.record_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          RECORD_ID: ${{ github.event.client_payload.record_id }}
        run: |
          npm run fetch-blog
          echo "Posts: $(node -e "console.log(require('./src/data/posts.json').length)")"

      - name: Fetch single library article (dispatch)
        if: ${{ github.event.client_payload.article_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          RECORD_ID: ${{ github.event.client_payload.article_id }}
        run: |
          npm run fetch-data
          echo "Articles: $(node -e "console.log(require('./src/data/articles.json').length)")"

      - name: Fetch single FAQ (dispatch)
        if: ${{ github.event.client_payload.faq_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          RECORD_ID: ${{ github.event.client_payload.faq_id }}
        run: |
          npm run fetch-faqs
          echo "FAQs: $(node -e "console.log(require('./src/data/faqs.json').length)")"

      - name: Fetch single glossary term (dispatch)
        if: ${{ github.event.client_payload.glossary_term_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          RECORD_ID: ${{ github.event.client_payload.glossary_term_id }}
        run: |
          npm run fetch-glossary
          echo "Glossary terms: $(node -e "console.log(require('./src/data/glossary.json').terms.length)")"

      - name: Fetch single course (dispatch)
        if: ${{ github.event.client_payload.course_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          RECORD_ID: ${{ github.event.client_payload.course_id }}
        run: |
          npm run fetch-courses
          echo "Courses: $(node -e "console.log(require('./src/data/courses.json').length)")"

      - name: Compute IndexNow single URL (dispatch)
        if: ${{ github.event.client_payload.record_id || github.event.client_payload.article_id || github.event.client_payload.faq_id || github.event.client_payload.course_id }}
        env:
          BLOG_RECORD_ID: ${{ github.event.client_payload.record_id }}
          ARTICLE_ID: ${{ github.event.client_payload.article_id }}
          FAQ_ID: ${{ github.event.client_payload.faq_id }}
          COURSE_ID: ${{ github.event.client_payload.course_id }}
        run: |
          node -e "
            const fs = require('fs');
            function findSlug(file, id, key='id') {
              if (!fs.existsSync(file) || !id) return null;
              try {
                const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                const list = Array.isArray(data) ? data : (data.terms || data.articles || data.posts || []);
                const r = list.find(x => x[key] === id);
                return r ? r.slug : null;
              } catch { return null; }
            }
            const blogSlug = findSlug('src/data/posts.json', process.env.BLOG_RECORD_ID);
            const articleSlug = findSlug('src/data/articles.json', process.env.ARTICLE_ID);
            const faqSlug = findSlug('src/data/faqs.json', process.env.FAQ_ID);
            const courseSlug = findSlug('src/data/courses.json', process.env.COURSE_ID);
            let url = '';
            if (blogSlug) url = 'https://rrmacademy.org/commentary/' + blogSlug + '/';
            else if (articleSlug) url = 'https://rrmacademy.org/library/' + articleSlug + '/';
            else if (faqSlug) url = 'https://rrmacademy.org/faqs/' + faqSlug + '/';
            else if (courseSlug) url = 'https://rrmacademy.org/courses/' + courseSlug + '/';
            if (url) {
              fs.appendFileSync(process.env.GITHUB_ENV, 'INDEXNOW_SINGLE_URL=' + url + '\n');
              console.log('IndexNow single URL: ' + url);
            } else {
              console.log('IndexNow: could not resolve dispatch record to URL — will fall back to full sitemap');
            }
          "

      - name: Fetch all data
        if: ${{ !inputs.skip_fetch && !github.event.client_payload.record_id && !github.event.client_payload.article_id && !github.event.client_payload.faq_id && !github.event.client_payload.glossary_term_id && !github.event.client_payload.course_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm run fetch-all
          echo "Articles: $(node -e "console.log(require('./src/data/articles.json').length)")"
          echo "Posts: $(node -e "console.log(require('./src/data/posts.json').length)")"
          echo "Partners: $(node -e "console.log(require('./src/data/partners.json').length)")"

      - name: Glossary link drift gate (Stage A — warn-only)
        run: node scripts/check-glossary-link-classes.mjs
        continue-on-error: true

      - name: Verify data files
        run: |
          fail=0
          # Minimum expected record counts (fail deploy if below these)
          declare -A MIN_COUNTS=( [articles.json]=2500 [posts.json]=5 [faqs.json]=10 [courses.json]=1 )
          # Max allowed drop per data file (articles churn with retractions; posts/faqs/courses should not drop)
          declare -A MAX_DROP=( [articles.json]=50 [posts.json]=1 [faqs.json]=1 [courses.json]=1 )
          # Absolute floor: baseline auto-update can ratchet down by max_drop per deploy,
          # but count below this floor fails immediately regardless of baseline. Prevents
          # slow cumulative data loss across N deploys (each within max_drop) from going
          # undetected. Set above MIN_COUNTS so it actually constrains.
          declare -A ABSOLUTE_FLOOR=( [articles.json]=3000 [posts.json]=18 [faqs.json]=22 [courses.json]=8 )

          # Load baselines for regression detection
          BASELINES_FILE="src/data/.baselines.json"
          declare -A BASELINES
          if [ -f "$BASELINES_FILE" ]; then
            while IFS='=' read -r key val; do
              BASELINES[$key]=$val
            done < <(node -e "
              const b = JSON.parse(require('fs').readFileSync('$BASELINES_FILE','utf8'));
              for (const [k,v] of Object.entries(b)) console.log(k + '=' + v);
            ")
          fi

          for f in src/data/articles.json src/data/posts.json src/data/faqs.json src/data/courses.json; do
            base=$(basename "$f")
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found. Cannot build without data files."
              echo "If using skip_fetch, ensure a previous run has cached the data."
              fail=1
            else
              count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).length)")
              min=${MIN_COUNTS[$base]:-1}
              baseline=${BASELINES[$base]:-0}
              max_drop=${MAX_DROP[$base]:-1}
              floor=${ABSOLUTE_FLOOR[$base]:-0}
              if [ "$count" = "0" ]; then
                echo "ERROR: $f contains zero records. Aborting to prevent empty deploy."
                fail=1
              elif [ "$count" -lt "$min" ]; then
                echo "ERROR: $f has only $count records (minimum: $min). Possible data loss."
                fail=1
              elif [ "$floor" -gt "0" ] && [ "$count" -lt "$floor" ]; then
                echo "ERROR: $f has $count records (absolute floor: $floor). Auto-baseline cannot ratchet below this."
                fail=1
              elif [ "$baseline" -gt "0" ] && [ "$count" -lt "$((baseline - max_drop))" ]; then
                echo "ERROR: $f dropped from $baseline to $count records (max allowed drop: $max_drop). Possible data regression."
                fail=1
              else
                echo "OK: $f has $count records (minimum: $min, floor: $floor, baseline: $baseline)"
              fi
            fi
          done

          # Courses have nested sections and steps -- count them to catch table wipes
          courses_file="src/data/courses.json"
          if [ -f "$courses_file" ]; then
            course_sections=$(node -e "const d=JSON.parse(require('fs').readFileSync('$courses_file','utf8')); console.log(d.reduce((a,c)=>a+(c.sections?.length||0),0))")
            course_steps=$(node -e "const d=JSON.parse(require('fs').readFileSync('$courses_file','utf8')); console.log(d.reduce((a,c)=>a+(c.sections||[]).reduce((b,s)=>b+(s.steps?.length||0),0),0))")
            # Floors set after STUC lesson cutting on 2026-05-01: 66 sections + 103 steps live.
            # Floors leave ~25% margin to allow normal per-course tweaks without false alarms,
            # but catch major regressions (e.g., admin endpoint bug wiping a course's steps,
            # migration script re-seeding to original 33/70 single-step state).
            courses_section_floor=55
            courses_step_floor=90
            if [ "$course_sections" -lt "$courses_section_floor" ]; then
              echo "ERROR: $courses_file has only $course_sections sections (absolute floor: $courses_section_floor). Possible data loss from migration or table wipe."
              fail=1
            elif [ "$course_steps" -lt "$courses_step_floor" ]; then
              echo "ERROR: $courses_file has only $course_steps steps (absolute floor: $courses_step_floor). Possible data loss from migration or table wipe."
              fail=1
            else
              echo "OK: $courses_file has $course_sections sections + $course_steps steps (floors: $courses_section_floor sections, $courses_step_floor steps)"
            fi
          else
            echo "WARN: $courses_file not found. Skipping section/step guard."
          fi

          # STUC course structure guard: each STUC course must have its expected lesson count.
          # Catches accidental partial wipes (e.g., deleting a lesson without restoring it).
          # Counts set 2026-05-01 after STUC lesson cutting completed. Only courses currently
          # status=published in D1 are listed here. functional-lab-testing-napro was unpublished
          # 2026-05-01 (transcript-only, no video) -- if re-published it should be added back.
          if [ -f "$courses_file" ]; then
            node -e "
              const d = JSON.parse(require('fs').readFileSync('$courses_file', 'utf8'));
              const expected = {
                'hormones-through-the-lifespan': 6,
                'pelvic-floor-rehabilitation': 6,
                'infertility-existential-trauma': 8,
                'fertility-based-family-planning': 7,
                'aip-diet-inflammation': 6,
              };
              let stucFail = false;
              for (const [id, want] of Object.entries(expected)) {
                const c = d.find(x => x.id === id);
                if (!c) { console.error('ERROR: STUC course ' + id + ' missing from courses.json'); stucFail = true; continue; }
                const stepCount = (c.sections || []).reduce((a, s) => a + (s.steps || []).length, 0);
                if (stepCount < want) {
                  console.error('ERROR: STUC course ' + id + ' has ' + stepCount + ' steps (expected >= ' + want + '). Lesson regression detected.');
                  stucFail = true;
                } else {
                  console.log('OK: STUC course ' + id + ' has ' + stepCount + ' steps (expected >= ' + want + ')');
                }
              }
              process.exit(stucFail ? 1 : 0);
            " || fail=1
          fi

          # Glossary has a nested structure: { terms, references, abbreviations }
          gloss_file="src/data/glossary.json"
          if [ -f "$gloss_file" ]; then
            gloss_terms=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$gloss_file','utf8')).terms.length)")
            gloss_refs=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$gloss_file','utf8')).references.length)")
            gloss_abbrs=$(node -e "console.log((JSON.parse(require('fs').readFileSync('$gloss_file','utf8')).abbreviations || []).length)")
            gloss_min_terms=100
            gloss_min_refs=30
            gloss_min_abbrs=40
            gloss_baseline=${BASELINES[glossary.terms]:-0}
            gloss_max_drop=5
            if [ "$gloss_terms" -lt "$gloss_min_terms" ]; then
              echo "ERROR: $gloss_file has only $gloss_terms terms (minimum: $gloss_min_terms). Possible data loss."
              fail=1
            elif [ "$gloss_refs" -lt "$gloss_min_refs" ]; then
              echo "ERROR: $gloss_file has only $gloss_refs references (minimum: $gloss_min_refs). Possible data loss."
              fail=1
            elif [ "$gloss_abbrs" -lt "$gloss_min_abbrs" ]; then
              echo "ERROR: $gloss_file has only $gloss_abbrs abbreviations (minimum: $gloss_min_abbrs). Possible data loss."
              fail=1
            elif [ "$gloss_baseline" -gt "0" ] && [ "$gloss_terms" -lt "$((gloss_baseline - gloss_max_drop))" ]; then
              echo "ERROR: $gloss_file terms dropped from $gloss_baseline to $gloss_terms (max allowed drop: $gloss_max_drop)."
              fail=1
            else
              echo "OK: $gloss_file has $gloss_terms terms + $gloss_refs refs + $gloss_abbrs abbrs (baseline terms: $gloss_baseline)"
            fi
          else
            echo "WARN: $gloss_file not found. Skipping glossary guard (push events skip fetch)."
          fi

          [ "$fail" = "0" ] || exit 1

      - name: Verify blog citations
        if: ${{ github.event.client_payload.record_id }}
        env:
          RECORD_ID: ${{ github.event.client_payload.record_id }}
        run: node scripts/verify-citations.mjs --record "$RECORD_ID"

      - name: Verify all blog citations (full rebuild)
        if: ${{ github.event_name != 'push' && !github.event.client_payload.record_id && !github.event.client_payload.article_id && !github.event.client_payload.faq_id }}
        run: node scripts/verify-citations.mjs
        continue-on-error: true

      - name: Pre-deploy content QA (deterministic + optional Sonnet)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/qa-pre-deploy.mjs
        continue-on-error: true

      - name: Snapshot data to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/snapshot-data.mjs
        continue-on-error: true

      - name: Type check (baseline)
        run: npm run check-types

      - name: Persona/enum sync check
        run: node scripts/check-persona-enum-sync.mjs

      - name: Bridge inbound-link warning (non-blocking)
        run: node scripts/check-bridge-links.mjs
        continue-on-error: true

      - name: Verify design system SSOT is in sync
        run: npm run design-tokens:check

      - name: Audit design tokens (no phantoms)
        run: npm run design-tokens:audit

      - name: Verify mobile hamburger (present + right-aligned)
        run: npm run verify-hamburger

      - name: Build site
        env:
          PUBLIC_SHELL_ROUTES: ${{ vars.PUBLIC_SHELL_ROUTES || '' }}
        run: npm run build

      - name: Verify generated data files
        # Post-build floor check on data files generated during npm run build
        # (not in the pre-build Verify step because they don't exist yet there).
        # Third-line defense -- build-guides-data.mjs and embed-library-ci.mjs
        # both already fail closed on missing/short guides.json.
        run: |
          guides_file="src/data/guides.json"
          if [ ! -f "$guides_file" ]; then
            echo "ERROR: $guides_file missing after build. Did scripts/build-guides-data.mjs run?"
            exit 1
          fi
          guides_count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$guides_file','utf8')).length)")
          if [ "$guides_count" -ne 11 ]; then
            echo "ERROR: $guides_file has $guides_count entries (expected 11 pillar guides)"
            exit 1
          fi
          echo "OK: $guides_file has $guides_count entries"

      - name: Validate glossary gates (always)
        # G1-G5 static gates have no dist dependency and snapshot:glossary only
        # needs dist/glossary/index.html, which is built on every deploy.
        # Both run regardless of dispatch shape so single-record updates still
        # pass the status-filter agreement and pillar JSON-LD invariants.
        run: |
          npm run gates:glossary:check
          npm run snapshot:glossary

      - name: Validate payment pipeline gates (always)
        # PG1-PG4 static gates: webhook signature/dedup discipline, no
        # err.message leak, enrollment revocation discipline, atomicity
        # heuristic. Static analysis only -- no D1 or Stripe calls. Catches
        # regression to the bug classes that produced 41 findings across 13
        # /arise runs on the payment surface.
        run: npm run gates:payment

      - name: Validate providers schema
        run: node scripts/gates/validate-providers-schema.mjs

      - name: Validate glossary spoke pages (full rebuild only)
        # Spoke directory only refreshes on full rebuild (getStaticPaths re-runs
        # against in-memory glossary.json, but dispatched single-record updates
        # patch one term row, not the spoke directory layout).
        if: ${{ !github.event.client_payload.record_id && !github.event.client_payload.article_id && !github.event.client_payload.faq_id && !github.event.client_payload.glossary_term_id && !github.event.client_payload.course_id }}
        run: npm run snapshot:spokes

      - name: Verify templates
        run: npm run verify-templates

      - name: Standards gate
        run: |
          if [ -f ../../tools/standards-gate/run.mjs ]; then
            npm run standards
          else
            echo "[standards-gate] WARN: ../../tools/standards-gate/run.mjs not vendored — skipped (CI fallback)"
            echo "Already enforced by postbuild during 'npm run build' when the tool is present."
          fi

      - name: Lint CF Pages _headers
        uses: rrmadmin/.github/.github/actions/lint-cf-headers@main
        with:
          headers-path: dist/_headers
          tools-token: ${{ secrets.GH_TOOLS_PAT }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name rrm-academy

      - name: Refresh Vectorize embeddings
        if: ${{ success() && github.event_name != 'push' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/embed-library-ci.mjs
        continue-on-error: true

      # AI Search corpus upload is a separate workflow
      # (`.github/workflows/ai-search-refresh.yml`) -- triggered via workflow_run
      # after Build & Deploy completes successfully. The decoupling exists
      # because the upload pushes ~4,300 items at ~1.85 items/sec (~40 min full
      # rebuild) and previously held this workflow's concurrency lock for up to
      # 60 min, blocking every queued deploy until its job-level timeout fired.
      # Data files are passed across workflows via this artifact.
      - name: Upload data files for AI Search refresh
        if: ${{ !inputs.skip_fetch }}
        uses: actions/upload-artifact@v4
        with:
          name: site-data
          path: src/data/*.json
          retention-days: 1
          if-no-files-found: error

      - name: Submit to IndexNow
        if: success()
        env:
          INDEXNOW_KEY: b8afc8c2e9b698654fff259a02fe1b51
        run: node scripts/submit-indexnow.mjs
        continue-on-error: true

      - name: Post-deploy render quality (sample, non-blocking)
        if: success()
        env:
          SITE_URL: https://rrmacademy.org
        run: node scripts/qa-post-deploy.mjs
        continue-on-error: true

      - name: Update data baselines
        if: success()
        run: |
          node -e "
            const fs = require('fs');
            const baselines = {};
            for (const f of ['articles.json','posts.json','faqs.json','courses.json','partners.json']) {
              const data = JSON.parse(fs.readFileSync('src/data/' + f, 'utf8'));
              baselines[f] = data.length;
            }
            // Glossary has nested structure; track terms + refs + abbrs separately.
            if (fs.existsSync('src/data/glossary.json')) {
              const g = JSON.parse(fs.readFileSync('src/data/glossary.json','utf8'));
              baselines['glossary.terms'] = (g.terms || []).length;
              baselines['glossary.references'] = (g.references || []).length;
              baselines['glossary.abbreviations'] = (g.abbreviations || []).length;
            }
            fs.writeFileSync('src/data/.baselines.json', JSON.stringify(baselines, null, 2) + '\n');
            console.log('Updated baselines:', baselines);
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/.baselines.json
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
          else
            git commit -m "chore: update data baselines after deploy"
            # Concurrent workflows can push to main between this run's checkout and push.
            # Rebase + retry absorbs that race; deploy already succeeded so a stale
            # baseline is harmless (next green deploy refreshes it).
            pushed=0
            for attempt in 1 2 3 4 5; do
              if git push; then
                pushed=1
                echo "Baseline push succeeded on attempt $attempt"
                break
              fi
              echo "Baseline push attempt $attempt rejected; rebasing and retrying..."
              git pull --rebase origin main || true
              sleep $((attempt * 2))
            done
            if [ "$pushed" != "1" ]; then
              echo "::warning::Baseline push failed after 5 attempts; baselines not updated this run"
            fi
          fi

      - name: Notify Observatory
        if: always()
        run: |
          STATUS=${{ job.status == 'success' && '"success"' || '"failure"' }}
          DURATION_MS=$(( $(date +%s%3N) - ${{ steps.timer.outputs.start }} ))
          CITATIONS="{}"
          if [ -f citation-summary.json ]; then
            CITATIONS=$(cat citation-summary.json)
          fi
          QA_PRE="{}"
          if [ -f qa-pre-summary.json ]; then
            QA_PRE=$(cat qa-pre-summary.json)
          fi
          QA_POST="{}"
          if [ -f qa-post-summary.json ]; then
            QA_POST=$(cat qa-post-summary.json)
          fi
          curl -sf -X POST \
            "https://rrm-observatory.administrator-cloudflare.workers.dev/api/deploy" \
            -H "Authorization: Bearer ${{ secrets.OBSERVATORY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"repo\": \"rrm-academy-cf\",
              \"status\": $STATUS,
              \"commit\": \"${{ github.sha }}\",
              \"duration_ms\": $DURATION_MS,
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"citations\": $CITATIONS,
              \"qa_pre\": $QA_PRE,
              \"qa_post\": $QA_POST
            }" || echo "Observatory notification failed (non-blocking)"

