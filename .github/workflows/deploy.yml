name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.*'
      - 'package.json'
      - 'package-lock.json'
      - 'functions/**'
      - 'tsconfig.json'
  repository_dispatch:
    types: [publish]
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: 'Skip Airtable data fetch (use cached data from last run)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Record job start time
        id: timer
        run: echo "start=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security guard
        run: node scripts/guard.mjs

      - name: Get cache date
        id: date
        run: echo "date=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore data cache
        uses: actions/cache@v4
        id: data-cache
        with:
          path: src/data
          key: airtable-data-${{ steps.date.outputs.date }}
          restore-keys: |
            airtable-data-

      - name: Restore git-committed data files over cache
        run: git checkout HEAD -- src/data/quizzes.json src/data/courses.json src/data/funding-projects.json

      - name: Fetch single blog record (dispatch)
        if: ${{ github.event.client_payload.record_id }}
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          RECORD_ID: ${{ github.event.client_payload.record_id }}
          TINIFY_API_KEY: ${{ secrets.TINIFY_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm run fetch-blog
          echo "Posts: $(node -e "console.log(require('./src/data/posts.json').length)")"

      - name: Fetch single library article (dispatch)
        if: ${{ github.event.client_payload.article_id }}
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          RECORD_ID: ${{ github.event.client_payload.article_id }}
        run: |
          npm run fetch-data
          echo "Articles: $(node -e "console.log(require('./src/data/articles.json').length)")"

      - name: Fetch all data from Airtable
        if: ${{ github.event_name != 'push' && !inputs.skip_fetch && !github.event.client_payload.record_id && !github.event.client_payload.article_id && steps.data-cache.outputs.cache-hit != 'true' }}
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          TINIFY_API_KEY: ${{ secrets.TINIFY_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm run fetch-all
          echo "Articles: $(node -e "console.log(require('./src/data/articles.json').length)")"
          echo "Posts: $(node -e "console.log(require('./src/data/posts.json').length)")"

      - name: Verify data files
        run: |
          fail=0
          # Minimum expected record counts (fail deploy if below these)
          declare -A MIN_COUNTS=( [articles.json]=2500 [posts.json]=5 [faqs.json]=10 [courses.json]=1 )
          for f in src/data/articles.json src/data/posts.json src/data/faqs.json src/data/courses.json; do
            base=$(basename "$f")
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found. Cannot build without data files."
              echo "If using skip_fetch, ensure a previous run has cached the data."
              fail=1
            else
              count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).length)")
              min=${MIN_COUNTS[$base]:-1}
              if [ "$count" = "0" ]; then
                echo "ERROR: $f contains zero records. Aborting to prevent empty deploy."
                fail=1
              elif [ "$count" -lt "$min" ]; then
                echo "ERROR: $f has only $count records (minimum: $min). Possible data loss."
                fail=1
              else
                echo "OK: $f has $count records (minimum: $min)"
              fi
            fi
          done
          [ "$fail" = "0" ] || exit 1

      - name: Verify blog citations
        if: ${{ github.event.client_payload.record_id }}
        run: node scripts/verify-citations.mjs --record "${{ github.event.client_payload.record_id }}"

      - name: Verify all blog citations (full rebuild)
        if: ${{ github.event_name != 'push' && !github.event.client_payload.record_id && !github.event.client_payload.article_id }}
        run: node scripts/verify-citations.mjs
        continue-on-error: true

      - name: Type check (baseline)
        run: npm run check-types

      - name: Build site
        run: npm run build

      - name: Verify templates
        run: npm run verify-templates

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name rrm-academy

      - name: Rebuild dedupe index
        if: ${{ always() && steps.deploy.outcome == 'success' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.LIBRARY_INDEX_KV_ID }}
        run: node scripts/rebuild-dedupe-index.mjs
        continue-on-error: true

      - name: Re-embed library vectors
        if: ${{ steps.deploy.outcome == 'success' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/embed-library-ci.mjs
        continue-on-error: true

      - name: Notify Observatory
        if: always()
        run: |
          STATUS=${{ job.status == 'success' && '"success"' || '"failure"' }}
          DURATION_MS=$(( $(date +%s%3N) - ${{ steps.timer.outputs.start }} ))
          CITATIONS="{}"
          if [ -f citation-summary.json ]; then
            CITATIONS=$(cat citation-summary.json)
          fi
          curl -sf -X POST \
            "https://rrm-observatory.administrator-cloudflare.workers.dev/api/deploy" \
            -H "Authorization: Bearer ${{ secrets.OBSERVATORY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"repo\": \"rrm-academy-cf\",
              \"status\": $STATUS,
              \"commit\": \"${{ github.sha }}\",
              \"duration_ms\": $DURATION_MS,
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"citations\": $CITATIONS
            }" || echo "Observatory notification failed (non-blocking)"
