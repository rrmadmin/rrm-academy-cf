name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.*'
      - 'package.json'
      - 'package-lock.json'
      - 'functions/**'
      - 'tsconfig.json'
  repository_dispatch:
    types: [publish]
  workflow_dispatch:
    inputs:
      skip_fetch:
        description: 'Skip data fetch (use cached data from last run)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Record job start time
        id: timer
        run: echo "start=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security guard
        run: node scripts/guard.mjs

      - name: iOS auto-zoom guard
        run: node scripts/guard-ios-zoom.mjs

      - name: Get cache date
        id: date
        run: echo "date=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Restore data cache
        uses: actions/cache@v4
        id: data-cache
        with:
          path: src/data
          key: site-data-${{ steps.date.outputs.date }}
          restore-keys: |
            site-data-

      - name: Restore git-committed data files over cache
        run: git checkout HEAD -- src/data/quizzes.json src/data/courses.json src/data/courses-overrides.json src/data/funding-projects.json

      - name: Fetch single blog record (dispatch)
        if: ${{ github.event.client_payload.record_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          RECORD_ID: ${{ github.event.client_payload.record_id }}
        run: |
          npm run fetch-blog
          echo "Posts: $(node -e "console.log(require('./src/data/posts.json').length)")"

      - name: Fetch single library article (dispatch)
        if: ${{ github.event.client_payload.article_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          RECORD_ID: ${{ github.event.client_payload.article_id }}
          AIRTABLE_WEBHOOK_URL: ${{ secrets.AIRTABLE_WEBHOOK_URL }}
        run: |
          npm run fetch-data
          echo "Articles: $(node -e "console.log(require('./src/data/articles.json').length)")"

      - name: Fetch single FAQ (dispatch)
        if: ${{ github.event.client_payload.faq_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          RECORD_ID: ${{ github.event.client_payload.faq_id }}
        run: |
          npm run fetch-faqs
          echo "FAQs: $(node -e "console.log(require('./src/data/faqs.json').length)")"

      - name: Fetch single glossary term (dispatch)
        if: ${{ github.event.client_payload.glossary_term_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          RECORD_ID: ${{ github.event.client_payload.glossary_term_id }}
        run: |
          npm run fetch-glossary
          echo "Glossary terms: $(node -e "console.log(require('./src/data/glossary.json').terms.length)")"

      - name: Compute IndexNow single URL (dispatch)
        if: ${{ github.event.client_payload.record_id || github.event.client_payload.article_id || github.event.client_payload.faq_id }}
        env:
          BLOG_RECORD_ID: ${{ github.event.client_payload.record_id }}
          ARTICLE_ID: ${{ github.event.client_payload.article_id }}
          FAQ_ID: ${{ github.event.client_payload.faq_id }}
        run: |
          node -e "
            const fs = require('fs');
            function findSlug(file, id, key='id') {
              if (!fs.existsSync(file) || !id) return null;
              try {
                const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                const list = Array.isArray(data) ? data : (data.terms || data.articles || data.posts || []);
                const r = list.find(x => x[key] === id);
                return r ? r.slug : null;
              } catch { return null; }
            }
            const blogSlug = findSlug('src/data/posts.json', process.env.BLOG_RECORD_ID);
            const articleSlug = findSlug('src/data/articles.json', process.env.ARTICLE_ID);
            const faqSlug = findSlug('src/data/faqs.json', process.env.FAQ_ID);
            let url = '';
            if (blogSlug) url = 'https://rrmacademy.org/commentary/' + blogSlug + '/';
            else if (articleSlug) url = 'https://rrmacademy.org/library/' + articleSlug + '/';
            else if (faqSlug) url = 'https://rrmacademy.org/faqs/' + faqSlug + '/';
            if (url) {
              fs.appendFileSync(process.env.GITHUB_ENV, 'INDEXNOW_SINGLE_URL=' + url + '\n');
              console.log('IndexNow single URL: ' + url);
            } else {
              console.log('IndexNow: could not resolve dispatch record to URL — will fall back to full sitemap');
            }
          "

      - name: Fetch all data
        if: ${{ !inputs.skip_fetch && !github.event.client_payload.record_id && !github.event.client_payload.article_id && !github.event.client_payload.faq_id && !github.event.client_payload.glossary_term_id }}
        env:
          LIBRARY_BUILD_TOKEN: ${{ secrets.LIBRARY_BUILD_TOKEN }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          TINIFY_API_KEY: ${{ secrets.TINIFY_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AIRTABLE_WEBHOOK_URL: ${{ secrets.AIRTABLE_WEBHOOK_URL }}
        run: |
          npm run fetch-all
          echo "Articles: $(node -e "console.log(require('./src/data/articles.json').length)")"
          echo "Posts: $(node -e "console.log(require('./src/data/posts.json').length)")"
          echo "Partners: $(node -e "console.log(require('./src/data/partners.json').length)")"

      - name: Verify data files
        run: |
          fail=0
          # Minimum expected record counts (fail deploy if below these)
          declare -A MIN_COUNTS=( [articles.json]=2500 [posts.json]=5 [faqs.json]=10 [courses.json]=1 )
          # Max allowed drop per data file (articles churn with retractions; posts/faqs/courses should not drop)
          declare -A MAX_DROP=( [articles.json]=50 [posts.json]=1 [faqs.json]=1 [courses.json]=1 )
          # Absolute floor: baseline auto-update can ratchet down by max_drop per deploy,
          # but count below this floor fails immediately regardless of baseline. Prevents
          # slow cumulative data loss across N deploys (each within max_drop) from going
          # undetected. Set above MIN_COUNTS so it actually constrains.
          declare -A ABSOLUTE_FLOOR=( [articles.json]=3000 [posts.json]=18 [faqs.json]=22 [courses.json]=8 )

          # Load baselines for regression detection
          BASELINES_FILE="src/data/.baselines.json"
          declare -A BASELINES
          if [ -f "$BASELINES_FILE" ]; then
            while IFS='=' read -r key val; do
              BASELINES[$key]=$val
            done < <(node -e "
              const b = JSON.parse(require('fs').readFileSync('$BASELINES_FILE','utf8'));
              for (const [k,v] of Object.entries(b)) console.log(k + '=' + v);
            ")
          fi

          for f in src/data/articles.json src/data/posts.json src/data/faqs.json src/data/courses.json; do
            base=$(basename "$f")
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found. Cannot build without data files."
              echo "If using skip_fetch, ensure a previous run has cached the data."
              fail=1
            else
              count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).length)")
              min=${MIN_COUNTS[$base]:-1}
              baseline=${BASELINES[$base]:-0}
              max_drop=${MAX_DROP[$base]:-1}
              floor=${ABSOLUTE_FLOOR[$base]:-0}
              if [ "$count" = "0" ]; then
                echo "ERROR: $f contains zero records. Aborting to prevent empty deploy."
                fail=1
              elif [ "$count" -lt "$min" ]; then
                echo "ERROR: $f has only $count records (minimum: $min). Possible data loss."
                fail=1
              elif [ "$floor" -gt "0" ] && [ "$count" -lt "$floor" ]; then
                echo "ERROR: $f has $count records (absolute floor: $floor). Auto-baseline cannot ratchet below this."
                fail=1
              elif [ "$baseline" -gt "0" ] && [ "$count" -lt "$((baseline - max_drop))" ]; then
                echo "ERROR: $f dropped from $baseline to $count records (max allowed drop: $max_drop). Possible data regression."
                fail=1
              else
                echo "OK: $f has $count records (minimum: $min, floor: $floor, baseline: $baseline)"
              fi
            fi
          done

          # Glossary has a nested structure: { terms, references, abbreviations }
          gloss_file="src/data/glossary.json"
          if [ -f "$gloss_file" ]; then
            gloss_terms=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$gloss_file','utf8')).terms.length)")
            gloss_refs=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$gloss_file','utf8')).references.length)")
            gloss_abbrs=$(node -e "console.log((JSON.parse(require('fs').readFileSync('$gloss_file','utf8')).abbreviations || []).length)")
            gloss_min_terms=100
            gloss_min_refs=30
            gloss_min_abbrs=40
            gloss_baseline=${BASELINES[glossary.terms]:-0}
            gloss_max_drop=5
            if [ "$gloss_terms" -lt "$gloss_min_terms" ]; then
              echo "ERROR: $gloss_file has only $gloss_terms terms (minimum: $gloss_min_terms). Possible data loss."
              fail=1
            elif [ "$gloss_refs" -lt "$gloss_min_refs" ]; then
              echo "ERROR: $gloss_file has only $gloss_refs references (minimum: $gloss_min_refs). Possible data loss."
              fail=1
            elif [ "$gloss_abbrs" -lt "$gloss_min_abbrs" ]; then
              echo "ERROR: $gloss_file has only $gloss_abbrs abbreviations (minimum: $gloss_min_abbrs). Possible data loss."
              fail=1
            elif [ "$gloss_baseline" -gt "0" ] && [ "$gloss_terms" -lt "$((gloss_baseline - gloss_max_drop))" ]; then
              echo "ERROR: $gloss_file terms dropped from $gloss_baseline to $gloss_terms (max allowed drop: $gloss_max_drop)."
              fail=1
            else
              echo "OK: $gloss_file has $gloss_terms terms + $gloss_refs refs + $gloss_abbrs abbrs (baseline terms: $gloss_baseline)"
            fi
          else
            echo "WARN: $gloss_file not found. Skipping glossary guard (push events skip fetch)."
          fi

          [ "$fail" = "0" ] || exit 1

      - name: Verify blog citations
        if: ${{ github.event.client_payload.record_id }}
        env:
          RECORD_ID: ${{ github.event.client_payload.record_id }}
        run: node scripts/verify-citations.mjs --record "$RECORD_ID"

      - name: Verify all blog citations (full rebuild)
        if: ${{ github.event_name != 'push' && !github.event.client_payload.record_id && !github.event.client_payload.article_id && !github.event.client_payload.faq_id }}
        run: node scripts/verify-citations.mjs
        continue-on-error: true

      - name: Pre-deploy content QA (deterministic + optional Sonnet)
        if: ${{ github.event_name != 'push' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/qa-pre-deploy.mjs
        continue-on-error: true

      - name: Snapshot data to R2
        if: ${{ github.event_name != 'push' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/snapshot-data.mjs
        continue-on-error: true

      - name: Type check (baseline)
        run: npm run check-types

      - name: Verify design system SSOT is in sync
        run: npm run design-tokens:check

      - name: Audit design tokens (no phantoms)
        run: npm run design-tokens:audit

      - name: Verify mobile hamburger (present + right-aligned)
        run: npm run verify-hamburger

      - name: Build site
        run: npm run build

      - name: Verify templates
        run: npm run verify-templates

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name rrm-academy

      - name: Refresh Vectorize embeddings
        if: ${{ success() && github.event_name != 'push' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/embed-library-ci.mjs
        continue-on-error: true

      - name: Submit to IndexNow
        if: success()
        env:
          INDEXNOW_KEY: b8afc8c2e9b698654fff259a02fe1b51
        run: node scripts/submit-indexnow.mjs
        continue-on-error: true

      - name: Post-deploy render quality (sample, non-blocking)
        if: success()
        env:
          SITE_URL: https://rrmacademy.org
        run: node scripts/qa-post-deploy.mjs
        continue-on-error: true

      - name: Update data baselines
        if: success()
        run: |
          node -e "
            const fs = require('fs');
            const baselines = {};
            for (const f of ['articles.json','posts.json','faqs.json','courses.json','partners.json']) {
              const data = JSON.parse(fs.readFileSync('src/data/' + f, 'utf8'));
              baselines[f] = data.length;
            }
            // Glossary has nested structure; track terms + refs + abbrs separately.
            if (fs.existsSync('src/data/glossary.json')) {
              const g = JSON.parse(fs.readFileSync('src/data/glossary.json','utf8'));
              baselines['glossary.terms'] = (g.terms || []).length;
              baselines['glossary.references'] = (g.references || []).length;
              baselines['glossary.abbreviations'] = (g.abbreviations || []).length;
            }
            fs.writeFileSync('src/data/.baselines.json', JSON.stringify(baselines, null, 2) + '\n');
            console.log('Updated baselines:', baselines);
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/.baselines.json
          git diff --cached --quiet || git commit -m "chore: update data baselines after deploy" && git push || echo "Baseline update skipped (no changes)"

      - name: Notify Observatory
        if: always()
        run: |
          STATUS=${{ job.status == 'success' && '"success"' || '"failure"' }}
          DURATION_MS=$(( $(date +%s%3N) - ${{ steps.timer.outputs.start }} ))
          CITATIONS="{}"
          if [ -f citation-summary.json ]; then
            CITATIONS=$(cat citation-summary.json)
          fi
          QA_PRE="{}"
          if [ -f qa-pre-summary.json ]; then
            QA_PRE=$(cat qa-pre-summary.json)
          fi
          QA_POST="{}"
          if [ -f qa-post-summary.json ]; then
            QA_POST=$(cat qa-post-summary.json)
          fi
          curl -sf -X POST \
            "https://rrm-observatory.administrator-cloudflare.workers.dev/api/deploy" \
            -H "Authorization: Bearer ${{ secrets.OBSERVATORY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"repo\": \"rrm-academy-cf\",
              \"status\": $STATUS,
              \"commit\": \"${{ github.sha }}\",
              \"duration_ms\": $DURATION_MS,
              \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"citations\": $CITATIONS,
              \"qa_pre\": $QA_PRE,
              \"qa_post\": $QA_POST
            }" || echo "Observatory notification failed (non-blocking)"
