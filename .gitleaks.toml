title = "rrm-academy-cf gitleaks config"

# Extend the default ruleset (https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml).
# The base rules are inherited; this file ADDS allowlists for known-FP patterns
# in this repo.

[extend]
useDefault = true

# Repo-wide allowlist applies to every rule.
[[allowlists]]
description = "Public-by-design Airtable IDs"
# All Airtable BASE IDs are 17 chars: app[A-Za-z0-9]{14}
# All Airtable TABLE IDs are 17 chars: tbl[A-Za-z0-9]{14}
# These look API-key-shaped to gitleaks but are public identifiers.
regexes = [
  '''app[A-Za-z0-9]{14}''',
  '''tbl[A-Za-z0-9]{14}''',
]

[[allowlists]]
description = "IndexNow public key (serves at /<key>.txt by design)"
regexes = ['''b8afc8c2e9b698654fff259a02fe1b51''']

[[allowlists]]
description = "Documentation placeholders for API auth headers"
regexes = [
  '''YOUR_API_KEY''',
  '''YOUR_TOKEN''',
  '''Bearer YOUR_[A-Z_]+''',
]

[[allowlists]]
description = "Test fixtures and localStorage keys"
regexes = [
  '''sk_test_placeholder''',
  '''stuc_migrate_banner_dismissed_v[0-9]+''',
  '''stuc_migrate_banner_dismissed_[a-z0-9_]+''',
]

[[allowlists]]
description = "1Password vault item IDs (read-only references, not credentials)"
regexes = ['''m47d7wovwkxumpm5adyecqwjgy''']

[[allowlists]]
description = "Stripe webhook endpoint IDs (we_* identifiers in documentation)"
# Endpoint IDs are public-readable in Stripe dashboard; secrets are whsec_*
regexes = ['''we_[A-Za-z0-9]{20,}''']

# Path-scoped allowlists for files that legitimately contain key-shaped strings.
# IMPORTANT: do NOT path-allowlist whole directories like docs/plans/ -- that would
# also suppress real leaks that happened to land there (e.g. the GA4 leak in
# 2026-02-27-ga4-middleware-plan.md). Use rule-scoped path allowlists instead.

[[allowlists]]
description = "Test fixtures use placeholder credentials"
paths = ['''test/_helpers\.js''']
regexes = ['''sk_(test|live)_placeholder''']

[[allowlists]]
description = "Slug strings (article slugs that match generic-api-key entropy)"
regexes = ['''the-physiology-of-gonadotropin-releasing-hormone-gnrh-secretion-in-men-and-women''']

[[allowlists]]
description = "Doc command-line examples — curl-auth-header rule false positives"
# Hand-curated set of doc files that show `Authorization: Bearer ...` examples.
# Must be exact paths (not directory globs) to avoid suppressing real leaks.
paths = [
  '''src/pages/connect/index\.astro''',
  '''src/pages/openapi\.astro''',
  '''src/pages/agent-auth\.astro''',
  '''src/pages/webhooks\.astro''',
  '''docs/plans/2026-02-26-phase8-migration-go-live-plan\.md''',
]
# Scope to the specific rule so other findings in these files still surface.
[[allowlists]]
description = "Stripe API curl examples in phase8 migration plan"
paths = ['''docs/plans/2026-02-26-phase8-migration-go-live-plan\.md''']
regexes = ['''api\.stripe\.com/v1/webhook_endpoints/we_[A-Za-z0-9]+''']
